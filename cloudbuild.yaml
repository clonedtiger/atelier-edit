steps:
  # 1. Start a local PostgreSQL server in a Docker network
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker network create test-net && \
        docker run -d \
          --name test-postgres \
          --network test-net \
          -e POSTGRES_DB=fashionfeed \
          -e POSTGRES_USER=postgres \
          -e POSTGRES_PASSWORD=postgres \
          postgres:15-alpine
    id: 'start-test-db'

  # 2. Run the test suite inside the same Docker network with the Postgres database
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        docker run \
          --network test-net \
          -e DATABASE_URL=postgresql://postgres:postgres@test-postgres:5432/fashionfeed \
          -v /workspace:/workspace \
          -w /workspace \
          node:20 \
          sh -c "npm ci && npx prisma generate && npx prisma db push && npm run test"
    id: 'run-tests'

  # 2. Build the container image using Docker
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}',
      '.'
    ]
    id: 'build-image'

  # 3. Push the container image to Google Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push',
      '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}'
    ]
    id: 'push-image'

  # 4. Deploy the container image to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args: [
      'run', 'deploy', '${_SERVICE_NAME}',
      '--image', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}',
      '--region', '${_REGION}',
      '--platform', 'managed',
      '--allow-unauthenticated',
      # Link Secret Manager secrets directly to container environment variables
      '--set-secrets', 'DATABASE_URL=DATABASE_URL:latest,GEMINI_API_KEY=GEMINI_API_KEY:latest,TAVILY_API_KEY=TAVILY_API_KEY:latest,NEXTAUTH_SECRET=NEXTAUTH_SECRET:latest',
      # Inject public non-sensitive configuration parameters
      '--set-env-vars', 'NODE_ENV=production'
    ]
    id: 'deploy-to-cloud-run'

substitutions:
  _REGION: 'us-central1'
  _REPOSITORY: 'atelier-edit-repo'
  _SERVICE_NAME: 'atelier-edit'

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${COMMIT_SHA}'

options:
  logging: CLOUD_LOGGING_ONLY
